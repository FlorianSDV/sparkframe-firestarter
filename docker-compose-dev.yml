# In case you have private composer packages you want to install in this project
# you can uncomment the commented out secret sections.

services:
  sparkframe-firestarter-dev:
    image: sparkframe-firestarter:dev
    container_name: sparkframe-firestarter-app-dev
    build:
      context: .
      # secrets: [composer_auth] # Uncomment if you are using private composer packages
      target: dev
    ports:
      - 8000:80
    volumes:
      - .:/var/www/html
      - vendor_dev:/var/www/html/vendor
    environment:
      XDEBUG_MODE: debug,develop
      XDEBUG_CONFIG: client_port=${XDEBUG_HOST_PORT} start_with_request=yes idekey=VSCODE
    depends_on:
      db:
        condition: service_healthy

# Uncomment if you are using private composer packages
# secrets:
#   composer_auth:
#     file: ${COMPOSER_AUTH_PATH}

volumes:
  vendor_dev: