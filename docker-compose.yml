services:
  sparkframe-firestarter:
    image: sparkframe-firestarter:production
    container_name: sparkframe-firestarter-app-production
    build:
      context: .
      secrets: [composer_auth]
      target: production
    ports:
      - 8001:80
    volumes:
      - ./public:/var/www/html/public
      - ./sqlite_db:/var/www/html/sqlite_db
      - ./src:/var/www/html/src
      - ./.env:/var/www/html/.env
      - ./composer.json:/var/www/html/composer.json
  db:
    image: mysql:9.5.0
    container_name: mysql-db-notes
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: notes-app
    ports:
      - 3306:3306
    volumes:
      - mysql-db-notes-volume:/var/lib/mysql

secrets:
  composer_auth:
    file: ${COMPOSER_AUTH_PATH}

volumes:
  mysql-db-notes-volume: